services:
  - type: web
    name: form-carrer
    env: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: formcarrer
          property: connectionString
  - type: pserv
    name: formcarrer
    env: postgres
    plan: free
    ipAllowList: []